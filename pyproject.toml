[project]
name = "gguf-limit-bench"
version = "0.1.0"
description = "Repeatable local GGUF benchmark cockpit for XTREME and clamshell deployment choices."
requires-python = ">=3.11"
dependencies = [
    "nvidia-ml-py>=12.0.0",
    "optuna>=4.8.0",
    "psutil>=5.9.0",
    "rich>=13.0.0",
    "textual>=0.80.0",
    "typer>=0.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[project.scripts]
gguf-limit-bench = "gguf_limit_bench.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
line-length = 100
