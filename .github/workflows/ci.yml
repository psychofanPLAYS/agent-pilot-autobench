name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Check formatting
        run: uv run --extra dev ruff format --check .

      - name: Lint
        run: uv run --extra dev ruff check .

      - name: Run tests
        run: uv run --extra dev python -m pytest -q

  windows-smoke:
    name: Windows first-run and CLI smoke test
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Test Windows launchers and CLI boundaries
        run: uv run --extra dev python -m pytest tests/test_windows_scripts.py tests/test_cli.py -q

      - name: Smoke-test public commands
        run: |
          uv run --extra dev agent-autobench --help
          uv run --extra dev agent-autobench doctor --json-out

  quality:
    name: Types, build, and wheel smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Type check
        run: uv run --extra dev mypy src

      - name: Compile source and tests
        run: uv run --extra dev python -m compileall -q src tests

      - name: Build wheel and source distribution
        run: uv build

      - name: Smoke-test the built wheel
        run: |
          uv venv .wheel-smoke
          uv pip install --python .wheel-smoke/bin/python dist/*.whl
          .wheel-smoke/bin/python -c "from gguf_limit_bench.simple_bench import load_simple_bench_questions; assert len(load_simple_bench_questions()) == 10"
          .wheel-smoke/bin/agent-autobench --help

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: agent-pilot-autobench-dist
          path: dist/*
