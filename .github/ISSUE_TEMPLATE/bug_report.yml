name: Bug report
description: Report a reproducible problem in Agent Pilot Autobench.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve the project. Remove private paths, prompts, and tokens before submitting.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: 0.1.0 or a commit hash
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and sanitized configuration
      description: Include the exact command, but remove private paths and secrets.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include a short error excerpt or sanitized receipt details.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private prompts, personal paths, and model files.
          required: true
